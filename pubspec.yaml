name: flutter_mint
description: "AquaFlow — ระบบจัดการส่งน้ำดื่ม"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.8.4
  go_router: ^14.8.1
  google_fonts: ^6.2.1
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  intl: ^0.19.0
  shimmer: ^3.0.0
  fl_chart: ^0.69.0
  flutter_animate: ^4.5.2
  provider: ^6.1.2
  uuid: ^4.5.1
  shared_preferences: ^2.3.5
  lottie: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

